{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} RideVehicle | NexusTaxi{% endblock %}
{% block page_title %}{% if editing %}Edit RideVehicle{% else %}New RideVehicle{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Registration</label>
        <input type="text" name="registration" value="{{ record.registration|default:'' }}">
      </div>
      <div class="form-group">
        <label>Make</label>
        <input type="text" name="make" value="{{ record.make|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Model</label>
        <input type="text" name="model" value="{{ record.model|default:'' }}">
      </div>
      <div class="form-group">
        <label>Vehicle Type</label>
        <select name="vehicle_type">
          <option value="mini" {% if record.vehicle_type == 'mini' %}selected{% endif %}>Mini</option>
          <option value="sedan" {% if record.vehicle_type == 'sedan' %}selected{% endif %}>Sedan</option>
          <option value="suv" {% if record.vehicle_type == 'suv' %}selected{% endif %}>SUV</option>
          <option value="premium" {% if record.vehicle_type == 'premium' %}selected{% endif %}>Premium</option>
          <option value="auto" {% if record.vehicle_type == 'auto' %}selected{% endif %}>Auto</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Year</label>
        <input type="number" name="year" value="{{ record.year|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Driver Name</label>
        <input type="text" name="driver_name" value="{{ record.driver_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="maintenance" {% if record.status == 'maintenance' %}selected{% endif %}>Maintenance</option>
          <option value="retired" {% if record.status == 'retired' %}selected{% endif %}>Retired</option>
        </select>
      </div>
      <div class="form-group">
        <label>Insurance Expiry</label>
        <input type="date" name="insurance_expiry" value="{{ record.insurance_expiry|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} RideVehicle</button>
      <a href="/ridevehicles/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
