{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Ride | NexusTaxi{% endblock %}
{% block page_title %}{% if editing %}Edit Ride{% else %}New Ride{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Ride Id</label>
        <input type="text" name="ride_id" value="{{ record.ride_id|default:'' }}">
      </div>
      <div class="form-group">
        <label>Rider Name</label>
        <input type="text" name="rider_name" value="{{ record.rider_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rider Phone</label>
        <input type="text" name="rider_phone" value="{{ record.rider_phone|default:'' }}">
      </div>
      <div class="form-group">
        <label>Pickup</label>
        <input type="text" name="pickup" value="{{ record.pickup|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Dropoff</label>
        <input type="text" name="dropoff" value="{{ record.dropoff|default:'' }}">
      </div>
      <div class="form-group">
        <label>Distance Km</label>
        <input type="number" step="0.01" name="distance_km" value="{{ record.distance_km|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fare</label>
        <input type="number" step="0.01" name="fare" value="{{ record.fare|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="requested" {% if record.status == 'requested' %}selected{% endif %}>Requested</option>
          <option value="accepted" {% if record.status == 'accepted' %}selected{% endif %}>Accepted</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Driver Name</label>
        <input type="text" name="driver_name" value="{{ record.driver_name|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Ride</button>
      <a href="/rides/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
