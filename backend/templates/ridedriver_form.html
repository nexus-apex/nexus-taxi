{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} RideDriver | NexusTaxi{% endblock %}
{% block page_title %}{% if editing %}Edit RideDriver{% else %}New RideDriver{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Vehicle Make</label>
        <input type="text" name="vehicle_make" value="{{ record.vehicle_make|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Vehicle Number</label>
        <input type="text" name="vehicle_number" value="{{ record.vehicle_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Trips Completed</label>
        <input type="number" name="trips_completed" value="{{ record.trips_completed|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="online" {% if record.status == 'online' %}selected{% endif %}>Online</option>
          <option value="on_trip" {% if record.status == 'on_trip' %}selected{% endif %}>On Trip</option>
          <option value="offline" {% if record.status == 'offline' %}selected{% endif %}>Offline</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Earnings Today</label>
        <input type="number" step="0.01" name="earnings_today" value="{{ record.earnings_today|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} RideDriver</button>
      <a href="/ridedrivers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
